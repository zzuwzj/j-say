services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ADMIN_PASSWORD=admin123
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost
      - IMPORT_LIMIT=5000
    volumes:
      - server-data:/app/data
    restart: unless-stopped

  admin:
    build: ./admin
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server-data: